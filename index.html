<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>regular agent call note</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@import url('https://fonts.googleapis.com/css2?family=Century+Gothic&display=swap');

body {
  background:#000;
  color:#fff;
  font-family:'Century Gothic',sans-serif;
  margin:0;
  padding:20px;
}

.container {
  background:#111;
  padding:20px;
  border-radius:10px;
  max-width:520px;
  margin:0 auto;
  box-shadow:0 0 10px rgba(255,255,255,.2);
}

label {
  display:block;
  margin:6px 0 4px;
}

input, textarea {
  width:100%;
  background:#222;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:5px;
  font-family:'Century Gothic',sans-serif;
  box-sizing:border-box;
}

textarea {
  min-height:60px;
  resize:vertical;
}

/* checkbox rows */
.row {
  display:grid;
  grid-template-columns:22px 1fr;
  column-gap:8px;
  align-items:center;
  margin:2px 0;
}

.row input[type=checkbox] {
  width:16px;
  height:16px;
  cursor:pointer;
}

/* optional task details */
.subnote {
  display:none;
  margin-left:calc(22px + 8px);
  width:calc(100% - (22px + 8px));
  margin-top:4px;
  margin-bottom:6px;
}

.button-row {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:12px;
}

button {
  background:#444;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:5px;
  cursor:pointer;
}

button:hover { background:#666; }

/* modal */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
}

.modal-content {
  background:#111;
  margin:15% auto;
  padding:20px;
  max-width:520px;
  border-radius:10px;
}

#output {
  height:240px;
  resize:none;
}

.close {
  float:right;
  font-size:28px;
  cursor:pointer;
  color:#aaa;
}

.close:hover { color:#fff; }
</style>
</head>

<body>

<div class="container">

<label>caller name:</label>
<input id="callerName">

<label>reason for call:</label>
<input id="reason">

<label>rx:</label>
<input id="rx">

<!-- TASKS -->
<label>tasks:</label>

<!-- TASK LIST -->
<script>
const TASKS = [
  { id: 1, label: "cost estimator", text: "checked cost and coverage for medication" },
  { id: 2, label: "view benefits", text: "checked benefit coverage for mbr" },
  { id: 3, label: "manage claims", text: "checked claims // located rx" },
  { id: 4, label: "request summary", text: "check prior authorization status for rx" },
  { id: 5, label: "sending forms", text: "faxed forms to prov office // advised of turn around time per j/a" },
  { id: 6, label: "prime resolution", text: "checked/created case for mbr" },
  { id: 7, label: "locate pharm", text: "locate in network pharm" },
  { id: 8, label: "accumulators", text: "reviewed mbr current accumulator totals" }
];
</script>

<div id="taskContainer"></div>

<label>res:</label>
<textarea id="resNotes" placeholder="resolution details"></textarea>

<div class="button-row">
  <button onclick="generateNote()">submit</button>
  <button onclick="location.reload()">cancel</button>
</div>

</div>

<!-- OUTPUT MODAL -->
<div class="modal" id="noteModal">
  <div class="modal-content">
    <span class="close" onclick="noteModal.style.display='none'">&times;</span>
    <textarea id="output" readonly></textarea>
    <div class="button-row">
      <button onclick="copyNote()">copy</button>
      <button onclick="location.reload()">finish</button>
    </div>
  </div>
</div>

<script>
const taskContainer = document.getElementById('taskContainer');

TASKS.forEach(t => {
  taskContainer.insertAdjacentHTML('beforeend', `
    <div class="row">
      <input type="checkbox" id="t${t.id}" onchange="toggleTask(${t.id})">
      <label for="t${t.id}">${t.label}</label>
    </div>
    <input id="n${t.id}" class="subnote" placeholder="optional details">
  `);
});

function toggleTask(id) {
  const cb = document.getElementById('t' + id);
  const note = document.getElementById('n' + id);
  note.style.display = cb.checked ? 'block' : 'none';
  if (!cb.checked) note.value = '';
}

function generateNote() {
  const lines = [];

  if (reason.value.trim())
    lines.push(`reason for call: ${reason.value.trim()} //`);

  if (rx.value.trim())
    lines.push(`rx: ${rx.value.trim()} //`);

  const taskLines = [];
  TASKS.forEach(t => {
    const cb = document.getElementById('t' + t.id);
    if (cb.checked) {
      const extra = document.getElementById('n' + t.id).value.trim();
      taskLines.push(`${t.text}${extra ? ' // ' + extra : ''} //`);
    }
  });

  if (taskLines.length) {
    lines.push(`tasks:\n${taskLines.join('\n')}`);
  }

  if (resNotes.value.trim()) {
    lines.push(`res:\n${resNotes.value.trim()}`);
  }

  output.value = lines.join('\n');
  noteModal.style.display = 'block';
}

function copyNote() {
  output.select();
  document.execCommand('copy');
}
</script>

</body>
</html>
