<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>notes</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
  background:#000;
  color:#fff;
  font-family:'Century Gothic',sans-serif;
  margin:0;
  padding:20px;
}

.container{
  background:#111;
  padding:20px;
  border-radius:10px;
  max-width:560px;
  margin:auto;
}

label{
  display:block;
  margin:8px 0 4px;
}

input, textarea{
  width:100%;
  background:#222;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:6px;
  box-sizing:border-box;
}

.row{
  display:grid;
  grid-template-columns:20px 1fr;
  gap:10px;
  align-items:center;
  margin:3px 0;
}

.resGroup, .subnote{
  display:none;
  margin-left:28px;
  width:calc(100% - 28px);
}

.button-row{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:12px;
}

button{
  background:#444;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:5px;
  cursor:pointer;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
}

.modal-content{
  background:#111;
  padding:20px;
  margin:12% auto;
  max-width:560px;
  border-radius:10px;
}

#output{
  width:100%;
  height:260px;
}

.close{
  float:right;
  cursor:pointer;
  font-size:24px;
}
</style>
</head>

<body>

<div class="container">

<label>caller name:</label>
<input id="callerName">

<label>called in regarding:</label>
<input id="reason">

<label>rx:</label>
<input id="rx">

<label>tasks:</label>
<div id="taskContainer"></div>

<div class="button-row">
<button onclick="generateNote()">submit</button>
<button onclick="resetForm()">cancel</button>
</div>

</div>

<div class="modal" id="noteModal">
<div class="modal-content">
<span class="close" onclick="noteModal.style.display='none'">&times;</span>
<textarea id="output" readonly></textarea>
<div class="button-row">
<button onclick="copyNote()">copy</button>
<button onclick="finishNote()">finish</button>
</div>
</div>
</div>

<script>

const TASKS = [
{
name:"manage claims",
taskText:"checked claims // located rx",
res:[
"claim reversed","claim paid","claim rejected","pharm unable to reverse",
"duplicate claim identified","r943 / refill too soon","r75 / prior authorization required",
"r76 / quantity limits reject","override applied per psa j/a","no avail override",
"escalated","no issue found"
]
},
{
name:"view benefits",
taskText:"checked benefit coverage for mbr",
res:[
"coverage confirmed","non-covered","prior authorization required",
"tier level identified","utilization management applies","plan limitation applies",
"benefit details reviewed","category coverage confirmed",
"copay structure reviewed","cost share provided for medication"
]
},
{
name:"cost estimator",
taskText:"checked cost and coverage for medication",
res:[
"estimated copay provided","prior authorization required",
"cost varies by pharmacy","provided alt medications",
"advised NF","advised of FE required"
]
},
{
name:"request summary",
taskText:"check prior authorization status for rx",
res:[
"advised of prior authorization approval","advised of prior authorization denial",
"provided denial reasoning","additional info being requested","provider outreach needed",
"clinical review in progress","status confirmed with provider","advised to schedule p2p",
"advised of next steps for prior authorization","advised of appeal steps per denial letter"
]
},
{
name:"sending forms",
taskText:"sending forms",
res:[
"forms faxed","forms emailed","forms requested from provider",
"prior authorization denial resent to provider",
"prior authorization approval resent to provider",
"fax confirmation received","incorrect fax number",
"provider office closed","turn around time provider per j/a",
"follow up recommended"
]
},
{
name:"prime resolution",
taskText:"checked/created case for mbr",
res:[
"case created","case updated","case escalated per AM",
"case closed","case already open","no case needed"
]
},
{
name:"locate pharm",
taskText:"locate in network pharm",
res:[
"in network pharmacy located","pharmacy not found",
"mail order option provided","pharmacy transfer advised",
"provider to resend rx","location information provided"
]
},
{
name:"accumulators",
taskText:"reviewed mbr current accumulator totals",
res:[
"accumulators reviewed","ded met","ded remaining",
"oop max remaining","oop max met","accumulators still accruing",
"accumulators incorrect","recent claims not yet applied",
"advised of accumulators balances","accumulators reset upcoming",
"financial responsibility explained"
]
}
];

const container = document.getElementById("taskContainer");

TASKS.forEach((t,i)=>{
container.insertAdjacentHTML("beforeend",`
<div class="row">
<input type="checkbox" id="t${i}" onchange="toggleTask(${i})">
<label for="t${i}">${t.name}</label>
</div>

<div id="res${i}" class="resGroup">
${t.res.map((r,j)=>`
<div class="row">
<input type="checkbox" id="t${i}r${j}">
<span>${r}</span>
</div>`).join("")}
</div>

<input id="n${i}" class="subnote" placeholder="additional details">
`);
});

function toggleTask(i){
const checked=document.getElementById(`t${i}`).checked;
document.getElementById(`res${i}`).style.display=checked?'block':'none';
document.getElementById(`n${i}`).style.display=checked?'block':'none';
}

function generateNote(){

let lines=[];

TASKS.forEach((t,i)=>{
if(!document.getElementById(`t${i}`).checked) return;

let block = `${t.name}:\n`;

/* ✅ reason now appears in EVERY task */
if(reason.value.trim()){
block += `called in regarding ${reason.value.trim()} //\n`;
}

block += `${t.taskText} //\n`;

if(rx.value.trim()){
block += `rx: ${rx.value.trim()} //\n`;
}

t.res.forEach((r,j)=>{
if(document.getElementById(`t${i}r${j}`).checked){
block += `${r} //\n`;
}
});

const extra = document.getElementById(`n${i}`).value.trim();
if(extra) block += extra + ' //';

lines.push(block.trim());
});

output.value = lines.join('\n\n');
noteModal.style.display='block';
}

function copyNote(){
output.select();
document.execCommand("copy");
}

function finishNote(){
resetForm();
noteModal.style.display='none';
}

function resetForm(){
document.querySelectorAll("input, textarea").forEach(el=>{
if(el.type==="checkbox") el.checked=false;
else el.value="";
});
document.querySelectorAll(".resGroup").forEach(el=>el.style.display="none");
document.querySelectorAll(".subnote").forEach(el=>el.style.display="none");
}

</script>

</body>
</html>
