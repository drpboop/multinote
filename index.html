<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>notes</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
  background:#000;
  color:#fff;
  font-family:'Century Gothic',sans-serif;
  padding:20px;
  margin:0;
}

.container{
  background:#111;
  padding:20px;
  border-radius:10px;
  max-width:560px;
  margin:auto;
  box-shadow:0 0 10px rgba(255,255,255,.2);
}

label{
  display:block;
  margin:8px 0 4px;
}

input,textarea{
  width:100%;
  background:#222;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:6px;
  box-sizing:border-box;
}

/* aligned rows */
.row{
  display:grid;
  grid-template-columns:20px 1fr;
  gap:10px;
  align-items:center;
  margin:4px 0;
}

/* sub sections aligned with label text */
.resGroup,
.subnote{
  display:none;
  margin-left:30px;
  width:calc(100% - 30px);
}

/* buttons */
.button-row{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:12px;
}

button{
  background:#444;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:5px;
  cursor:pointer;
}

button:hover{background:#666}

/* modal */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
}

.modal-content{
  background:#111;
  margin:12% auto;
  padding:20px;
  border-radius:10px;
  max-width:560px;
}

#output{
  height:260px;
  width:100%;
}

.close{
  float:right;
  cursor:pointer;
  font-size:26px;
}
</style>
</head>

<body>

<div class="container">

<label>caller name:</label>
<input id="callerName">

<label>called in regarding:</label>
<input id="reason">

<label>rx:</label>
<input id="rx">

<label>tasks:</label>
<div id="taskContainer"></div>

<div class="button-row">
<button onclick="generateNote()">submit</button>
<button onclick="resetForm()">cancel</button>
</div>

</div>

<div class="modal" id="noteModal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>

<textarea id="output" readonly></textarea>

<div class="button-row">
<button onclick="copyNote()">copy</button>
<button onclick="finishNote()">finish</button>
</div>
</div>
</div>

<script>

const TASKS=[
{
name:"manage claims",
taskText:"checked claims // located rx",
res:[
"claim reversed","claim paid","claim rejected","pharm unable to reverse",
"duplicate claim identified","r943 / refill too soon","r75 / prior authorization required",
"r76 / quantity limits reject","override applied per psa j/a","no avail override",
"escalated","no issue found"
]
},
{
name:"view benefits",
taskText:"checked benefit coverage for mbr",
res:[
"coverage confirmed","non-covered","prior authorization required",
"tier level identified","utilization management applies","plan limitation applies",
"benefit details reviewed","category coverage confirmed",
"copay structure reviewed","cost share provided for medication"
]
},
{
name:"cost estimator",
taskText:"checked cost and coverage for medication",
res:[
"estimated copay provided","prior authorization required","cost varies by pharmacy",
"provided alt medications","advised NF","advised of FE required"
]
}
];

const container=document.getElementById("taskContainer");

TASKS.forEach((t,i)=>{
container.insertAdjacentHTML("beforeend",`
<div class="row">
<input type="checkbox" id="t${i}" onchange="toggleTask(${i})">
<label for="t${i}">${t.name}</label>
</div>

<div id="res${i}" class="resGroup">
${t.res.map((r,j)=>`
<div class="row">
<input type="checkbox" id="t${i}r${j}">
<span>${r}</span>
</div>`).join("")}
</div>

<input id="n${i}" class="subnote" placeholder="additional details">
`);
});

function toggleTask(i){
const checked=document.getElementById(`t${i}`).checked;
document.getElementById(`res${i}`).style.display=checked?'block':'none';
document.getElementById(`n${i}`).style.display=checked?'block':'none';

if(!checked){
document.getElementById(`n${i}`).value='';
}
}

function generateNote(){

const lines=[];
let firstTaskUsed=false;

TASKS.forEach((t,i)=>{
const cb=document.getElementById(`t${i}`);
if(!cb.checked) return;

let block=`${t.name}:\n`;

/* inject reason into first task */
if(!firstTaskUsed && reason.value.trim()){
block+=`called in regarding ${reason.value.trim()} //\n`;
firstTaskUsed=true;
}

block+=`${t.taskText}\n`;

/* RX is now in task block */
if(rx.value.trim()){
block+=`rx: ${rx.value.trim()}\n`;
}

/* res lines */
t.res.forEach((r,j)=>{
if(document.getElementById(`t${i}r${j}`).checked){
block+=`${r} //\n`;
}
});

/* optional text */
const extra=document.getElementById(`n${i}`).value.trim();
if(extra) block+=extra;

/* add block separator */
lines.push(block.trim()+" //");
});

output.value=lines.join('\n\n');
noteModal.style.display='block';
}

/* COPY */
function copyNote(){
output.select();
document.execCommand("copy");
}

/* FINISH (full reset) */
function finishNote(){
resetForm();
noteModal.style.display='none';
}

/* RESET */
function resetForm(){
document.querySelectorAll("input, textarea").forEach(el=>{
if(el.type==="checkbox") el.checked=false;
else el.value="";
});

document.querySelectorAll(".resGroup").forEach(el=>el.style.display="none");
document.querySelectorAll(".subnote").forEach(el=>el.style.display="none");
}

/* close modal */
function closeModal(){
noteModal.style.display='none';
}

</script>

</body>
</html>
