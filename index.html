<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>regular agent call note</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@import url('https://fonts.googleapis.com/css2?family=Century+Gothic&display=swap');

body {
  background:#000;
  color:#fff;
  font-family:'Century Gothic',sans-serif;
  margin:0;
  padding:20px;
}

.container {
  background:#111;
  padding:20px;
  border-radius:10px;
  max-width:520px;
  margin:0 auto;
  box-shadow:0 0 10px rgba(255,255,255,.2);
}

label {
  display:block;
  margin:6px 0 4px;
}

input, textarea {
  width:100%;
  background:#222;
  color:#fff;
  border:none;
  padding:8px;
  border-radius:5px;
  font-family:'Century Gothic',sans-serif;
  box-sizing:border-box;
}

textarea {
  min-height:60px;
  resize:vertical;
}

/* checkbox rows */
.row {
  display:grid;
  grid-template-columns:22px 1fr;
  column-gap:8px;
  align-items:center;
  margin:2px 0;
}

.row input[type=checkbox] {
  width:16px;
  height:16px;
  cursor:pointer;
}

/* optional task details */
.subnote {
  display:none;
  margin-left:calc(22px + 8px);
  width:calc(100% - (22px + 8px));
  margin-top:4px;
  margin-bottom:6px;
}

.button-row {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:12px;
}

button {
  background:#444;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:5px;
  cursor:pointer;
}

button:hover { background:#666; }

/* modal */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
}

.modal-content {
  background:#111;
  margin:15% auto;
  padding:20px;
  max-width:520px;
  border-radius:10px;
}

#output {
  height:240px;
  resize:none;
}

.close {
  float:right;
  font-size:28px;
  cursor:pointer;
  color:#aaa;
}

.close:hover { color:#fff; }
</style>
</head>

<body>

<div class="container">

<!-- INTERNAL ONLY -->
<label>caller name:</label>
<input id="callerName">

<label>reason for call:</label>
<input id="reason">

<label>rx:</label>
<input id="rx">

<!-- TASKS -->
<label>tasks:</label>

<!-- Core tasks -->
<div class="row">
  <input type="checkbox" id="t1" onchange="toggleTaskNote(1)">
  <label for="t1">checked cost and coverage for medication</label>
</div>
<input id="n1" class="subnote" placeholder="optional details">

<div class="row">
  <input type="checkbox" id="t2" onchange="toggleTaskNote(2)">
  <label for="t2">checked benefit coverage for mbr</label>
</div>
<input id="n2" class="subnote" placeholder="optional details">

<div class="row">
  <input type="checkbox" id="t3" onchange="toggleTaskNote(3)">
  <label for="t3">checked claims // located rx</label>
</div>
<input id="n3" class="subnote" placeholder="optional details">

<div class="row">
  <input type="checkbox" id="t4" onchange="toggleTaskNote(4)">
  <label for="t4">check prior authorization status for rx</label>
</div>
<input id="n4" class="subnote" placeholder="optional details">

<div class="row">
  <input type="checkbox" id="t5" onchange="toggleTaskNote(5)">
  <label for="t5">faxed forms to prov office</label>
</div>
<input id="n5" class="subnote" placeholder="optional details">

<!-- Former RES options now tasks -->
<div class="row">
  <input type="checkbox" id="t6" onchange="toggleTaskNote(6)">
  <label for="t6">check/apply override per psa j/a</label>
</div>
<input id="n6" class="subnote" placeholder="optional details">

<div class="row">
  <input type="checkbox" id="t7" onchange="toggleTaskNote(7)">
  <label for="t7">review/resolve claim reject</label>
</div>
<input id="n7" class="subnote" placeholder="optional details">

<div class="row">
  <input type="checkbox" id="t8" onchange="toggleTaskNote(8)">
  <label for="t8">verify costshare details via benefits</label>
</div>
<input id="n8" class="subnote" placeholder="optional details">

<div class="row">
  <input type="checkbox" id="t9" onchange="toggleTaskNote(9)">
  <label for="t9">confirm coverage</label>
</div>
<input id="n9" class="subnote" placeholder="optional details">

<!-- RES NOTES ONLY -->
<label>res:</label>
<textarea id="resNotes" placeholder="resolution details"></textarea>

<div class="button-row">
  <button onclick="generateNote()">submit</button>
  <button onclick="location.reload()">cancel</button>
</div>

</div>

<!-- OUTPUT -->
<div class="modal" id="noteModal">
  <div class="modal-content">
    <span class="close" onclick="noteModal.style.display='none'">&times;</span>
    <textarea id="output" readonly></textarea>
    <div class="button-row">
      <button onclick="output.select();document.execCommand('copy')">copy</button>
    </div>
  </div>
</div>

<script>
function toggleTaskNote(num) {
  const cb = document.getElementById('t' + num);
  const note = document.getElementById('n' + num);
  note.style.display = cb.checked ? 'block' : 'none';
  if (!cb.checked) note.value = '';
}

function generateNote() {
  const lines = [];

  if (reason.value.trim())
    lines.push(`reason for call: ${reason.value.trim()} //`);

  if (rx.value.trim())
    lines.push(`rx: ${rx.value.trim()} //`);

  const tasks = [
    ['t1','n1','checked cost and coverage for medication'],
    ['t2','n2','checked benefit coverage for mbr'],
    ['t3','n3','checked claims // located rx'],
    ['t4','n4','check prior authorization status for rx'],
    ['t5','n5','faxed forms to prov office'],
    ['t6','n6','check/apply override per psa j/a'],
    ['t7','n7','review/resolve claim reject'],
    ['t8','n8','verify costshare details via benefits'],
    ['t9','n9','confirm coverage']
  ];

  const taskLines = [];
  tasks.forEach(t => {
    if (document.getElementById(t[0]).checked) {
      const extra = document.getElementById(t[1]).value.trim();
      taskLines.push(`${t[2]}${extra ? ' // ' + extra : ''} //`);
    }
  });

  if (taskLines.length) {
    lines.push(`tasks:\n${taskLines.join('\n')}`);
  }

  if (resNotes.value.trim()) {
    lines.push(`res:\n${resNotes.value.trim()}`);
  }

  output.value = lines.join('\n');
  noteModal.style.display = 'block';
}
</script>

</body>
</html>
